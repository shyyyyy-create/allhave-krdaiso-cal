<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Shopping List 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f9f9fb; }
        .tab-active { border-bottom: 3px solid #ff8a8a; color: #ff8a8a; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-white p-6 sticky top-0 z-50 border-b border-gray-100">
        <h1 class="text-2xl font-bold text-center text-gray-800 tracking-tight">🇰🇷 2026 韓國購物清單</h1>
        <div class="flex justify-around mt-4 text-sm font-medium text-gray-400">
            <button onclick="switchTab('oy')" id="tab-oy" class="pb-2 tab-active transition-all">Olive Young</button>
            <button onclick="switchTab('daiso')" id="tab-daiso" class="pb-2 transition-all">Daiso</button>
            <button onclick="switchTab('others')" id="tab-others" class="pb-2 transition-all">其他購買</button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="list-container" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- 內容由 JS 動態生成 -->
    </main>

    <!-- Total Stats Footer -->
    <footer class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex justify-between items-center shadow-lg">
        <div class="text-gray-600">
            <p class="text-xs">總計預算 (估算)</p>
            <p class="text-lg font-bold text-pink-500">₩ <span id="total-krw">0</span></p>
        </div>
        <button onclick="openModal()" class="bg-black text-white px-6 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition-transform">
            <i class="fas fa-plus mr-2"></i> 新增項目
        </button>
    </footer>

    <!-- Modal (新增項目) -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-4">新增購物項目</h2>
            <div class="space-y-4">
                <input type="text" id="item-name" placeholder="名稱 (e.g. 樺樹汁防曬)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <div class="flex gap-2">
                    <input type="number" id="item-price" placeholder="價格 (₩)" class="w-1/2 p-3 bg-gray-50 rounded-xl">
                    <input type="number" id="item-qty" placeholder="數量" value="1" class="w-1/2 p-3 bg-gray-50 rounded-xl">
                </div>
                <select id="item-category" class="w-full p-3 bg-gray-50 rounded-xl">
                    <option value="oy">Olive Young</option>
                    <option value="daiso">Daiso</option>
                    <option value="others">其他</option>
                </select>
                <input type="text" id="item-img" placeholder="圖片連結 (URL) 或 留空" class="w-full p-3 bg-gray-50 rounded-xl">
                <div class="flex gap-2 mt-6">
                    <button onclick="closeModal()" class="flex-1 py-3 text-gray-500 font-medium">取消</button>
                    <button onclick="addItem()" class="flex-1 py-3 bg-pink-400 text-white rounded-xl font-bold">確認新增</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'oy';
        let items = JSON.parse(localStorage.getItem('k-shopping-list')) || [
            { id: 1, name: 'Round Lab 防曬乳', price: 25000, qty: 2, cat: 'oy', img: 'https://global.oliveyoung.com/display/page/best-seller' },
            { id: 2, name: 'Daiso TAG 眉筆', price: 3000, qty: 1, cat: 'daiso', img: '' }
        ];

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('header button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            render();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addItem() {
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value || 0;
            const qty = document.getElementById('item-qty').value || 1;
            const cat = document.getElementById('item-category').value;
            const img = document.getElementById('item-img').value;

            if(!name) return alert('請輸入名稱');
            
            items.push({ id: Date.now(), name, price: parseInt(price), qty: parseInt(qty), cat, img });
            saveAndRender();
            closeModal();
            // 重置表單
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
        }

        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('k-shopping-list', JSON.stringify(items));
            render();
        }

        function render() {
            const container = document.getElementById('list-container');
            const filtered = items.filter(i => i.cat === currentTab);
            let total = 0;

            container.innerHTML = filtered.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="bg-white p-4 rounded-2xl card-shadow border border-gray-50 flex items-center gap-4">
                        <div class="w-20 h-20 bg-gray-100 rounded-lg overflow-hidden flex-shrink-0">
                            ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<div class="flex items-center justify-center h-full text-gray-300"><i class="fas fa-image"></i></div>`}
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-sm text-gray-400">₩${item.price.toLocaleString()} x ${item.qty}</p>
                            <p class="text-pink-500 font-bold mt-1">₩${(item.price * item.qty).toLocaleString()}</p>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="text-gray-300 hover:text-red-400 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            }).join('');

            document.getElementById('total-krw').innerText = items.reduce((sum, i) => sum + (i.price * i.qty), 0).toLocaleString();
        }

        render();
    </script>
</body>
</html>
